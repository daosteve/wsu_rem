# ─────────────────────────────────────────────────────────────────────────────
# NGINX virtual host for WSU Remediation
# Place in /etc/nginx/sites-available/wsu_rem.conf
# Enable: ln -s /etc/nginx/sites-available/wsu_rem.conf /etc/nginx/sites-enabled/
# ─────────────────────────────────────────────────────────────────────────────

server {
    listen 443 ssl http2;
    server_name wsu-rem.yourdomain.com;   # ← change to your FQDN

    ssl_certificate     /etc/ssl/certs/wsu-rem.crt;
    ssl_certificate_key /etc/ssl/private/wsu-rem.key;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    # ── Security headers ──────────────────────────────────────────────────────
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;
    add_header X-Frame-Options DENY always;
    add_header X-Content-Type-Options nosniff always;
    add_header Referrer-Policy no-referrer always;
    # Adjust script-src / style-src if you host Bootstrap locally instead of CDN
    add_header Content-Security-Policy
      "default-src 'self'; script-src 'self' https://cdn.jsdelivr.net; style-src 'self' https://cdn.jsdelivr.net; font-src 'self'; img-src 'self' data:; connect-src 'self'" always;

    # Limit upload size (CSV files should never be large)
    client_max_body_size 1M;

    location / {
        proxy_pass         http://127.0.0.1:5001;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 30;
        proxy_connect_timeout 5;
    }

    # Block direct access to .env / secrets directory
    location ~ /\. {
        deny all;
    }
    location /secrets/ {
        deny all;
    }
}

# HTTP → HTTPS redirect
server {
    listen 80;
    server_name wsu-rem.yourdomain.com;
    return 301 https://$host$request_uri;
}
