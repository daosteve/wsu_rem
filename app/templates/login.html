{% extends 'base.html' %}
{% block title %}Sign In – WSU Remediation{% endblock %}

{% block content %}
<div class="row justify-content-center mt-5">
  <div class="col-sm-10 col-md-6 col-lg-4">
    <div class="card shadow-sm">
      <div class="card-body p-4">
        <h4 class="card-title mb-4 text-center">Sign In</h4>
        <form method="post" action="{{ url_for('auth.login') }}" autocomplete="off" novalidate>
          <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
          <div class="mb-3">
            <label for="username" class="form-label">Username</label>
            <input type="text" class="form-control" id="username" name="username"
                   autocomplete="username" required autofocus maxlength="64">
          </div>
          <div class="mb-4">
            <label for="password" class="form-label">Password</label>
            <input type="password" class="form-control" id="password" name="password"
                   autocomplete="current-password" required>
          </div>
          <button type="submit" class="btn btn-primary w-100">Sign In</button>
        </form>
      </div>
    </div>
    <p class="text-center text-muted mt-3 small">
      Authorized personnel only. All activity is logged and monitored.
    </p>
  </div>
</div>
{% endblock %}
