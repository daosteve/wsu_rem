{% extends 'base.html' %}
{% block title %}Logs – WSU Remediation{% endblock %}

{% block content %}
<h5>Operation Logs</h5>
<hr class="mt-1">

<!-- ── Filters ───────────────────────────────────────────────────────────── -->
<form id="filterForm" class="row g-2 mb-3">
  <div class="col-6 col-md-2">
    <input type="text" class="form-control form-control-sm" name="operator" placeholder="Operator">
  </div>
  <div class="col-6 col-md-2">
    <input type="text" class="form-control form-control-sm" name="username" placeholder="Target username">
  </div>
  <div class="col-6 col-md-2">
    <select class="form-select form-select-sm" name="system">
      <option value="">All systems</option>
      <option value="AD">Active Directory</option>
      <option value="GW">Google Workspace</option>
      <option value="Entra">Entra ID</option>
    </select>
  </div>
  <div class="col-6 col-md-2">
    <select class="form-select form-select-sm" name="action">
      <option value="">All actions</option>
      <option value="ad_disable">ad_disable</option>
      <option value="ad_enable">ad_enable</option>
      <option value="ad_reset_password">ad_reset_password</option>
      <option value="gw_suspend">gw_suspend</option>
      <option value="gw_reset_cookies">gw_reset_cookies</option>
      <option value="entra_revoke_sessions">entra_revoke_sessions</option>
    </select>
  </div>
  <div class="col-4 col-md-1">
    <select class="form-select form-select-sm" name="result">
      <option value="">All</option>
      <option value="success">Success</option>
      <option value="error">Error</option>
    </select>
  </div>
  <div class="col-4 col-md-1">
    <input type="date" class="form-control form-control-sm" name="from_date" title="From date">
  </div>
  <div class="col-4 col-md-1">
    <input type="date" class="form-control form-control-sm" name="to_date" title="To date">
  </div>
  <div class="col-12 col-md-1">
    <button type="submit" class="btn btn-primary btn-sm w-100">Search</button>
  </div>
</form>

<!-- ── Table ─────────────────────────────────────────────────────────────── -->
<div class="table-responsive">
  <table class="table table-bordered table-hover table-sm">
    <thead class="table-dark">
      <tr>
        <th>Timestamp (UTC)</th>
        <th>Operator</th>
        <th>Target User</th>
        <th>System</th>
        <th>Action</th>
        <th>Result</th>
        <th>Detail</th>
      </tr>
    </thead>
    <tbody id="logTableBody">
      <tr>
        <td colspan="7" class="text-center text-muted">Loading…</td>
      </tr>
    </tbody>
  </table>
</div>

<div class="d-flex justify-content-between align-items-center">
  <p id="totalCount" class="text-muted small mb-0"></p>
  <nav id="paginationNav" class="d-none" aria-label="Log pagination">
    <ul class="pagination pagination-sm mb-0" id="paginationList"></ul>
  </nav>
</div>

<!-- ── Remediate Modal ──────────────────────────────────────────────────── -->
<div class="modal fade" id="remediateModal" tabindex="-1" aria-labelledby="remediateModalLabel" aria-hidden="true">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title" id="remediateModalLabel">Remediate User</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
      </div>
      <div class="modal-body">
        <p class="mb-3">Target: <strong id="remediateUsername" class="font-monospace"></strong></p>
        <div class="d-grid gap-2">
          <button class="btn btn-success" id="btnEnable">Re-enable AD Account</button>
          <button class="btn btn-warning" id="btnResetPwd">Reset AD Password</button>
          <button class="btn btn-success" id="btnGwUnsuspend">Re-enable GW Account</button>
        </div>
        <div id="pwdSection" class="mt-3 d-none">
          <hr class="my-2">
          <div class="mb-2">
            <label for="newPassword" class="form-label small mb-1">New password</label>
            <input type="password" class="form-control form-control-sm" id="newPassword" autocomplete="new-password">
          </div>
          <div class="mb-2">
            <label for="confirmPassword" class="form-label small mb-1">Confirm password</label>
            <input type="password" class="form-control form-control-sm" id="confirmPassword" autocomplete="new-password">
          </div>
          <div class="d-grid">
            <button class="btn btn-warning btn-sm" id="btnConfirmReset">Confirm Password Reset</button>
          </div>
        </div>
        <div id="remediateResult" class="mt-3"></div>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
      </div>
    </div>
  </div>
</div>
{% endblock %}

{% block scripts %}
<script src="{{ url_for('static', filename='logs.js') }}"></script>
{% endblock %}
