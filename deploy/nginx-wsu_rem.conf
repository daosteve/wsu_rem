server {
    listen 80;
    listen [::]:80;
    server_name rem.worcester.edu;

    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name rem.worcester.edu;

    ssl_certificate     /etc/ssl/certs/rem.worcester.edu_2026.crt;
    ssl_certificate_key /etc/ssl/private/rem.worcester.edu_2026.key;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options    "nosniff" always;
    add_header X-Frame-Options           "DENY" always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin" always;
    add_header Content-Security-Policy
      "default-src 'self'; script-src 'self'; style-src 'self'; font-src 'self'; img-src 'self' data:; connect-src 'self'" always;

    # CSV uploads are small; 2 MB is more than enough
    client_max_body_size 2m;

    # Suppress favicon 404
    location = /favicon.ico {
        return 204;
        access_log off;
    }

    location /static/ {
        alias /opt/wsu_rem/app/static/;
        access_log off;
        expires 1h;
        add_header Cache-Control "public, max-age=3600";
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header X-Content-Type-Options    "nosniff" always;
        add_header X-Frame-Options           "DENY" always;
        add_header Referrer-Policy           "strict-origin-when-cross-origin" always;
        add_header Content-Security-Policy
          "default-src 'self'; script-src 'self'; style-src 'self'; font-src 'self'; img-src 'self' data:; connect-src 'self'" always;
    }

    location / {
        proxy_pass         http://unix:/run/wsu_rem/gunicorn.sock;
        proxy_http_version 1.1;
        proxy_read_timeout 90s;

        proxy_set_header Host              $host;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-Host  $host;
    }

    # Block direct access to .env and secrets
    location ~ /\. {
        deny all;
    }
    location /secrets/ {
        deny all;
    }
}
